# Render blueprint: one web service (worker + UI share the same disk/filesystem).
# Render persistent disks cannot be attached to multiple services.
services:
  - type: web
    name: col
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile
    dockerCommand: ./deploy/start-all.sh
    plan: starter
    disk:
      name: col-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: TABLEBASE_DIR
        value: /data/tablebases
      - key: STATUS_FILE
        value: /data/solver_status.json
      - key: COL_M
        value: "3"
      - key: COL_N
        value: "11"
      - key: CONTINUOUS_START_TOTAL
        value: "3"
